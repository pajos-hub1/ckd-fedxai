# ============================================================
# CKD-FedXAI — central configuration
# All tunable parameters live here (Chapter 3 spec).
# ============================================================

seed: 42

paths:
  raw_data: "data/raw/kidney_disease.csv"
  processed_data: "data/processed/ckd_processed.csv"
  partitions_dir: "data/partitions"
  results_dir: "results"
  figures_dir: "results/figures"
  metrics_dir: "results/metrics"
  models_dir: "results/models"

data:
  id_column: "id"
  target_column: "classification"
  positive_class: "ckd"
  negative_class: "notckd"
  test_size: 0.2
  numeric_features:
    ["age", "bp", "sg", "al", "su", "bgr", "bu", "sc", "sod", "pot", "hemo", "pcv", "wc", "rc"]
  nominal_features:
    ["rbc", "pc", "pcc", "ba", "htn", "dm", "cad", "appet", "pe", "ane"]

preprocess:
  numeric_imputation: "median"
  knn_neighbors: 5
  categorical_imputation: "most_frequent"
  scaling: "standard"

feature_selection:
  enable: true
  correlation_threshold: 0.95
  use_permutation_importance: true
  top_k: null

models:
  random_forest:
    n_estimators: 200
    max_depth: null
    random_state: 42
  xgboost:
    n_estimators: 200
    learning_rate: 0.1
    max_depth: 4
    random_state: 42
  logistic_regression:
    max_iter: 1000
    random_state: 42

federated:
  num_clients: 5
  num_rounds: 20
  local_epochs: 1
  partition_scheme: "iid"
  dirichlet_alpha: 0.5

privacy:
  differential_privacy:
    enable: false
    epsilons: [10.0, 5.0, 1.0, 0.5]
    delta: 1.0e-5
    mechanism: "gaussian"
  homomorphic_encryption:
    enable: false
    scheme: "CKKS"
    poly_modulus_degree: 8192
    coeff_mod_bit_sizes: [60, 40, 40, 60]
    global_scale_bits: 40

explainability:
  shap: true
  lime: true
  num_lime_samples: 5

evaluation:
  metrics: ["accuracy", "precision", "recall", "specificity", "f1", "auc_roc"]
  cv_folds: 5